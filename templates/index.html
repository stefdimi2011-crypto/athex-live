<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHEX Live - Τιμές Μετοχών</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .last-update {
            color: #666;
            font-size: 14px;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: #5568d3;
        }

        .search-box {
            input {
                padding: 10px 15px;
                border: 1px solid #ddd;
                border-radius: 6px;
                width: 300px;
                font-size: 14px;
            }

            input:focus {
                outline: none;
                border-color: #667eea;
                box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            }
        }

        .stocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stock-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .stock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .stock-symbol {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .stock-price {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }

        .stock-change {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .change-up {
            color: #10b981;
        }

        .change-down {
            color: #ef4444;
        }

        .change-neutral {
            color: #6b7280;
        }

        .stock-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #666;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            color: #999;
            font-size: 11px;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-value {
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: white;
            font-size: 18px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 16px;
            background: white;
            border-radius: 12px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .stat-label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        footer {
            text-align: center;
            color: rgba(255,255,255,0.8);
            padding: 20px;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .stocks-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 24px;
            }

            .search-box input {
                width: 100%;
            }

            .header-info {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-info">
                <div>
                    <h1>📈 ATHEX Live</h1>
                    <div class="last-update">Τελευταία ενημέρωση: <span id="updateTime">-</span></div>
                </div>
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Αναζήτηση μετοχής... (π.χ. ALPHA, OTE)">
                    </div>
                    <button class="refresh-btn" onclick="refreshData()">🔄 Ενημέρωση</button>
                </div>
            </div>
        </header>

        <div id="stats" class="stats"></div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="loading" class="loading" style="display: none;">
            ⏳ Φόρτωση δεδομένων...
        </div>

        <div id="stocks" class="stocks-grid" style="display: none;"></div>
    </div>

    <footer>
        <p>ATHEX Live Dashboard • Δεδομένα από Capital.gr API • © 2026</p>
    </footer>

    <script>
        const API_BASE = '/api';
        let allStocks = [];

        async function loadData() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const stocksDiv = document.getElementById('stocks');

            try {
                loading.style.display = 'block';
                error.style.display = 'none';
                stocksDiv.style.display = 'none';

                // Fetch prices
                const pricesResponse = await fetch(`${API_BASE}/prices`);
                if (!pricesResponse.ok) throw new Error('Failed to fetch prices');
                const pricesData = await pricesResponse.json();

                // Fetch stocks
                const stocksResponse = await fetch(`${API_BASE}/stocks`);
                if (!stocksResponse.ok) throw new Error('Failed to fetch stocks');
                const stocksData = await stocksResponse.json();

                allStocks = stocksData.stocks || [];
                updateStats(allStocks);
                renderStocks(allStocks);
                updateTime();

                loading.style.display = 'none';
                stocksDiv.style.display = 'grid';
            } catch (err) {
                console.error('Error:', err);
                loading.style.display = 'none';
                error.style.display = 'block';
                error.textContent = `❌ Σφάλμα: ${err.message}`;
            }
        }

        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('el-GR');
            document.getElementById('updateTime').textContent = timeStr;
        }

        function updateStats(stocks) {
            const statsDiv = document.getElementById('stats');
            const gainers = stocks.filter(s => s.change > 0).length;
            const losers = stocks.filter(s => s.change < 0).length;
            const neutral = stocks.filter(s => s.change === 0).length;

            const avgChange = stocks.length > 0 
                ? (stocks.reduce((sum, s) => sum + (s.changePercent || 0), 0) / stocks.length).toFixed(2)
                : 0;

            statsDiv.innerHTML = `
                <div class="stat-box">
                    <div class="stat-label">Σύνολο Μετοχών</div>
                    <div class="stat-value">${stocks.length}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Ανοδικές</div>
                    <div class="stat-value" style="color: #10b981;">${gainers}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Καθοδικές</div>
                    <div class="stat-value" style="color: #ef4444;">${losers}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Μέση Μεταβολή</div>
                    <div class="stat-value">${avgChange}%</div>
                </div>
            `;
        }

        function renderStocks(stocks) {
            const stocksDiv = document.getElementById('stocks');

            if (stocks.length === 0) {
                stocksDiv.innerHTML = '<div class="no-results">Δεν βρέθηκαν μετοχές</div>';
                return;
            }

            stocksDiv.innerHTML = stocks.map(stock => {
                const changeClass = stock.change > 0 ? 'change-up' : stock.change < 0 ? 'change-down' : 'change-neutral';
                const changeIcon = stock.change > 0 ? '▲' : stock.change < 0 ? '▼' : '−';
                const changePercent = stock.changePercent ? stock.changePercent.toFixed(2) : '0.00';
                const change = stock.change ? stock.change.toFixed(2) : '0.00';

                return `
                    <div class="stock-card">
                        <div class="stock-header">
                            <div class="stock-symbol">${stock.symbol}</div>
                            <div style="color: #999; font-size: 12px;">${stock.name || ''}</div>
                        </div>
                        <div class="stock-price">€${stock.price.toFixed(2)}</div>
                        <div class="stock-change ${changeClass}">
                            ${changeIcon} ${change} (${changePercent}%)
                        </div>
                        <div class="stock-details">
                            <div class="detail-item">
                                <div class="detail-label">Άνοιγμα</div>
                                <div class="detail-value">€${stock.open ? stock.open.toFixed(2) : 'N/A'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Μέγιστο</div>
                                <div class="detail-value">€${stock.high ? stock.high.toFixed(2) : 'N/A'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Ελάχιστο</div>
                                <div class="detail-value">€${stock.low ? stock.low.toFixed(2) : 'N/A'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Όγκος</div>
                                <div class="detail-value">${stock.volume ? stock.volume.toLocaleString('el-GR') : 'N/A'}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterStocks() {
            const query = document.getElementById('searchInput').value.toUpperCase();
            const filtered = allStocks.filter(stock => 
                stock.symbol.includes(query) || (stock.name && stock.name.toUpperCase().includes(query))
            );
            renderStocks(filtered);
        }

        function refreshData() {
            loadData();
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', filterStocks);

        // Auto-refresh every 60 seconds
        setInterval(loadData, 60000);

        // Initial load
        loadData();
    </script>
</body>
</html>
